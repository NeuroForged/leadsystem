spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
      default-encoding: UTF-8

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
calendly:
  client_id: ${CALENDLY_CLIENT_ID}
  redirect-uri: ${CALENDLY_REDIRECT_URI}
  client-secret: ${CALENDLY_CLIENT_SECRET}
  webhook-signing-key: ${CALENDLY_WEBHOOK_SIGNING_KEY}
  scope: organization.read scheduled_events.read scheduled_events.read_all

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

neuroforged:
  admin:
    email: ${NEUROFORGED_ADMIN_EMAIL}
    password: ${NEUROFORGED_ADMIN_PASSWORD}
  jwt:
    secret: ${NEUROFORGED_JWT_SECRET}
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  mail:
    from: ${SPRING_MAIL_FROM}
  tokens:
    internal: ${NEUROFORGED_INTERNAL_TOKEN}

rate-limit:
  requests-per-minute: 60
  requests-per-hour: 500

scraper:
  api-url: ${SCRAPER_API_URL:https://scraper.alchemizeiq.com}
  api-key: ${SCRAPER_API_KEY}
