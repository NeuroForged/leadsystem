name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Compile
        run: ./mvnw compile -q

      - name: Test
        run: ./mvnw test -q

      - name: Package (verify JAR builds)
        run: ./mvnw package -DskipTests -q
